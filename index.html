  <style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #f0f0f0;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 1.75rem;
      position: relative;
      z-index: 10;
    }

    .hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: #888780;
      transition: background 0.2s;
    }
    .hamburger:hover span { background: #f0f0f0; }

    .btn-wallet {
      display: flex;
      align-items: center;
      gap: 7px;
      background: #120f00;
      border: 0.5px solid #2e2408;
      border-radius: 8px;
      padding: 9px 16px;
      font-size: 13px;
      color: #D4A017;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.2s;
    }
    .btn-wallet:hover { background: #1a1500; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      width: 240px;
      height: 100%;
      background: #0f0f0f;
      border-right: 0.5px solid #1e1e1e;
      z-index: 30;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      display: flex;
      flex-direction: column;
      padding: 1.25rem 0;
    }
    .drawer.open { transform: translateX(0); }

    .drawer-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.25rem 1.25rem;
      border-bottom: 0.5px solid #1a1a1a;
      margin-bottom: 0.5rem;
    }
    .drawer-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .drawer-wordmark {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.05em;
      color: #f0f0f0;
      font-family: 'Cinzel', serif;
    }
    .drawer-wordmark span { color: #D4A017; }

    .drawer-close {
      background: none;
      border: none;
      cursor: pointer;
      color: #5F5E5A;
      font-size: 18px;
      line-height: 1;
      padding: 2px 5px;
      transition: color 0.2s;
    }
    .drawer-close:hover { color: #f0f0f0; }

    .drawer-nav { display: flex; flex-direction: column; }

    .drawer-link {
      background: none;
      border: none;
      text-align: left;
      padding: 0.85rem 1.25rem;
      font-size: 13px;
      color: #888780;
      cursor: pointer;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: color 0.15s, background 0.15s;
    }
    .drawer-link:hover { color: #f0f0f0; background: #141414; }
    .drawer-link .arrow { font-size: 11px; color: #3a3a3a; }

    .drawer-divider {
      height: 0.5px;
      background: #1a1a1a;
      margin: 0.5rem 0;
    }

    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .hero-mark { margin-bottom: 1.75rem; }

    .hero-title {
      font-size: clamp(36px, 6vw, 52px);
      font-weight: 500;
      color: #f0f0f0;
      letter-spacing: 0.08em;
      font-family: 'Cinzel', serif;
      line-height: 1.1;
      margin-bottom: 0.7rem;
    }
    .hero-title span { color: #D4A017; }

    .hero-sub {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #2a2410;
      margin-bottom: 2.75rem;
    }

    .hero-enter {
      background: transparent;
      border: 0.5px solid #2a2a2a;
      border-radius: 8px;
      padding: 11px 32px;
      font-size: 13px;
      color: #888780;
      cursor: default;
      letter-spacing: 0.05em;
    }
    .hero-enter:disabled { opacity: 1; }

    .footer {
      text-align: center;
      padding: 1.25rem;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: #1e1e1e;
      text-transform: uppercase;
    }
  
</style>
